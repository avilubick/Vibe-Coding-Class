<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crossy Road 3D Clone</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; }
        #game-ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; }
        #score { font-size: 48px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #game-over { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9); padding: 2rem; border-radius: 1rem;
            text-align: center; display: none; pointer-events: auto;
        }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div id="score">0</div>
    </div>

    <div id="game-over">
        <h1 class="text-4xl font-black text-slate-800 mb-4">CRASHED!</h1>
        <p id="final-score" class="text-xl mb-6 text-slate-600">Score: 0</p>
        <button id="retry-btn" class="bg-yellow-400 hover:bg-yellow-500 text-black font-bold py-3 px-8 rounded-full transition-transform active:scale-95">
            TRY AGAIN
        </button>
    </div>

    <script>
        // --- CONSTANTS & CONFIG ---
        const CHICKEN_SIZE = 0.6;
        const TYPE_GRASS = 'grass';
        const TYPE_ROAD = 'road';
        const TYPE_WATER = 'water';

        const COLORS = {
            grass: 0x7cfc00,
            road: 0x444444,
            water: 0x00bfff,
            chicken: 0xffffff,
            car: [0xff4444, 0x44ff44, 0x4444ff, 0xffff44, 0xff44ff]
        };

        const BACKGROUNDS = [0x87ceeb, 0xfca5a5, 0x93c5fd, 0xd8b4fe, 0xfde047, 0x86efac];

        // --- GAME STATE ---
        let scene, camera, renderer, chicken;
        let lanes = [];
        let score = 0;
        let maxScore = 0;
        let isGameOver = false;
        let lanesGenerated = 0;
        let lastLaneType = null;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(BACKGROUNDS[0]);

            const aspect = window.innerWidth / window.innerHeight;
            const d = 10;
            camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
            camera.position.set(10, 10, 10);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(-10, 20, 10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            scene.add(dirLight);

            createChicken();
            
            for(let i = -5; i < 15; i++) {
                generateLane(i);
            }

            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('keydown', onKeyDown);
            
            document.getElementById('retry-btn').onclick = resetGame;

            animate();
        }

        function createChicken() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(CHICKEN_SIZE, CHICKEN_SIZE, CHICKEN_SIZE),
                new THREE.MeshStandardMaterial({ color: COLORS.chicken })
            );
            body.position.y = CHICKEN_SIZE / 2;
            body.castShadow = true;
            group.add(body);

            const comb = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.2, 0.4),
                new THREE.MeshStandardMaterial({ color: 0xff0000 })
            );
            comb.position.y = CHICKEN_SIZE;
            group.add(comb);

            const beak = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.1, 0.2),
                new THREE.MeshStandardMaterial({ color: 0xffa500 })
            );
            beak.position.y = CHICKEN_SIZE/2;
            beak.position.z = CHICKEN_SIZE/2;
            group.add(beak);

            chicken = group;
            chicken.position.set(0, 0, 0);
            scene.add(chicken);
        }

        function generateLane(z) {
            let type = TYPE_GRASS;
            if (z > 2) {
                const rand = Math.random();
                if (rand > 0.8) type = TYPE_GRASS;
                else if (rand > 0.4) type = TYPE_ROAD;
                else type = TYPE_WATER;
            }

            const laneGroup = new THREE.Group();
            laneGroup.userData.type = type;
            laneGroup.userData.z = z;

            const ground = new THREE.Mesh(
                new THREE.BoxGeometry(30, 1, 1),
                new THREE.MeshStandardMaterial({ color: COLORS[type] })
            );
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            laneGroup.add(ground);

            if (type === TYPE_GRASS && z !== 0) {
                for(let i = -10; i < 10; i++) {
                    if (Math.random() > 0.8) addTree(laneGroup, i);
                }
            } else if (type === TYPE_ROAD) {
                laneGroup.userData.speed = (Math.random() * 0.1 + 0.05) * (Math.random() > 0.5 ? 1 : -1);
                laneGroup.userData.vehicles = [];
                for(let i = 0; i < 3; i++) {
                    addCar(laneGroup, (Math.random() * 20) - 10);
                }
            } else if (type === TYPE_WATER) {
                laneGroup.userData.speed = (Math.random() * 0.05 + 0.03) * (Math.random() > 0.5 ? 1 : -1);
                laneGroup.userData.logs = [];
                for(let i = 0; i < 3; i++) {
                    addLog(laneGroup, (Math.random() * 20) - 10);
                }
            }

            laneGroup.position.z = z;
            scene.add(laneGroup);
            lanes.push(laneGroup);
            lanesGenerated = z;
        }

        function addTree(lane, x) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 0.3), new THREE.MeshStandardMaterial({ color: 0x8b4513 }));
            trunk.position.y = 0.4;
            tree.add(trunk);
            const leaves = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({ color: 0x006400 }));
            leaves.position.y = 1.0;
            tree.add(leaves);
            tree.position.x = x;
            lane.add(tree);
        }

        function addCar(lane, x) {
            const carGroup = new THREE.Group();
            const carColor = COLORS.car[Math.floor(Math.random()*COLORS.car.length)];
            
            // Main body
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.5, 0.8), new THREE.MeshStandardMaterial({ color: carColor }));
            body.position.y = 0.35;
            body.castShadow = true;
            carGroup.add(body);

            // Roof
            const roof = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 0.7), new THREE.MeshStandardMaterial({ color: carColor }));
            roof.position.y = 0.7;
            roof.castShadow = true;
            carGroup.add(roof);

            // Windows
            const windowMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const winFront = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.3, 0.6), windowMat);
            winFront.position.set(0.4, 0.7, 0);
            carGroup.add(winFront);

            // Wheels
            const wheelGeo = new THREE.BoxGeometry(0.3, 0.3, 0.9);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const wheelsFront = new THREE.Mesh(wheelGeo, wheelMat);
            wheelsFront.position.set(0.4, 0.15, 0);
            carGroup.add(wheelsFront);
            const wheelsBack = new THREE.Mesh(wheelGeo, wheelMat);
            wheelsBack.position.set(-0.4, 0.15, 0);
            carGroup.add(wheelsBack);

            carGroup.position.set(x, 0, 0);
            // Flip car based on direction
            if (lane.userData.speed < 0) carGroup.rotation.y = Math.PI;

            lane.add(carGroup);
            lane.userData.vehicles.push(carGroup);
        }

        function addLog(lane, x) {
            const log = new THREE.Mesh(new THREE.BoxGeometry(2, 0.2, 0.7), new THREE.MeshStandardMaterial({ color: 0xdeb887 }));
            log.position.set(x, 0, 0);
            lane.add(log);
            lane.userData.logs.push(log);
        }

        function onKeyDown(e) {
            if (isGameOver) return;
            switch(e.key) {
                case 'ArrowUp': moveChicken('forward'); break;
                case 'ArrowDown': moveChicken('backward'); break;
                // INVERTED: Right moves Left, Left moves Right
                case 'ArrowLeft': moveChicken('right'); break;
                case 'ArrowRight': moveChicken('left'); break;
            }
        }

        function moveChicken(dir) {
            if (isGameOver) return;
            let nextX = chicken.position.x;
            let nextZ = chicken.position.z;

            if (dir === 'forward') nextZ += 1;
            if (dir === 'backward') nextZ -= 1;
            if (dir === 'left') nextX += 1;
            if (dir === 'right') nextX -= 1;

            const targetLane = lanes.find(l => Math.round(l.position.z) === Math.round(nextZ));
            if (targetLane && targetLane.userData.type === TYPE_GRASS) {
                const obstacle = targetLane.children.find(c => c.type === 'Group' && Math.round(c.position.x) === Math.round(nextX));
                if (obstacle) return;
            }

            chicken.position.x = nextX;
            chicken.position.z = nextZ;
            
            if (dir === 'forward') chicken.rotation.y = 0;
            if (dir === 'backward') chicken.rotation.y = Math.PI;
            if (dir === 'left') chicken.rotation.y = Math.PI / 2;
            if (dir === 'right') chicken.rotation.y = -Math.PI / 2;

            if (nextZ > maxScore) {
                maxScore = nextZ;
                score = Math.floor(maxScore);
                document.getElementById('score').innerText = score;
                
                // Change background color when crossing onto a road
                if (targetLane && targetLane.userData.type === TYPE_ROAD) {
                    const randomColor = BACKGROUNDS[Math.floor(Math.random() * BACKGROUNDS.length)];
                    scene.background.set(randomColor);
                }

                if (maxScore + 15 > lanesGenerated) {
                    generateLane(lanesGenerated + 1);
                }
            }
        }

        function checkCollisions() {
            const z = Math.round(chicken.position.z);
            const x = chicken.position.x;
            const lane = lanes.find(l => Math.round(l.position.z) === z);
            if (!lane) return;

            if (lane.userData.type === TYPE_ROAD) {
                lane.userData.vehicles.forEach(car => {
                    if (Math.abs(x - car.position.x) < 1.0) gameOver();
                });
            }

            if (lane.userData.type === TYPE_WATER) {
                let onLog = false;
                lane.userData.logs.forEach(log => {
                    if (Math.abs(x - log.position.x) < 1.2) {
                        onLog = true;
                        chicken.position.x += lane.userData.speed;
                    }
                });
                if (!onLog) gameOver();
            }

            if (Math.abs(chicken.position.x) > 12) gameOver();
        }

        function gameOver() {
            if (isGameOver) return;
            isGameOver = true;
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-score').innerText = "Score: " + score;
        }

        function resetGame() {
            isGameOver = false;
            score = 0;
            maxScore = 0;
            lanesGenerated = 0;
            scene.background.set(BACKGROUNDS[0]);
            document.getElementById('score').innerText = "0";
            document.getElementById('game-over').style.display = 'none';
            lanes.forEach(l => scene.remove(l));
            lanes = [];
            chicken.position.set(0, 0, 0);
            chicken.rotation.y = 0;
            for(let i = -5; i < 15; i++) generateLane(i);
        }

        function onWindowResize() {
            const aspect = window.innerWidth / window.innerHeight;
            const d = 10;
            camera.left = -d * aspect; camera.right = d * aspect;
            camera.top = d; camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isGameOver) {
                lanes.forEach(lane => {
                    if (lane.userData.type === TYPE_ROAD) {
                        lane.userData.vehicles.forEach(car => {
                            car.position.x += lane.userData.speed;
                            if (car.position.x > 15) car.position.x = -15;
                            if (car.position.x < -15) car.position.x = 15;
                        });
                    }
                    if (lane.userData.type === TYPE_WATER) {
                        lane.userData.logs.forEach(log => {
                            log.position.x += lane.userData.speed;
                            if (log.position.x > 15) log.position.x = -15;
                            if (log.position.x < -15) log.position.x = 15;
                        });
                    }
                });
                checkCollisions();
                const targetCamX = chicken.position.x + 10;
                const targetCamZ = chicken.position.z + 10;
                camera.position.x += (targetCamX - camera.position.x) * 0.1;
                camera.position.z += (targetCamZ - camera.position.z) * 0.1;
                camera.lookAt(chicken.position.x, 0, chicken.position.z);
            }
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
